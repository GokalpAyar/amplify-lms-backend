services:
  # Backend API
  - type: web
    name: amplify-lms-backend
    env: python
    plan: free
    buildCommand: |
      apt-get update && apt-get install -y ffmpeg
      pip install -r requirements.txt
    startCommand: uvicorn app_api:app --host 0.0.0.0 --port 8000
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: WHISPER_MODEL
        value: base
  
  # Frontend (if you want Render to host it too)
  - type: web
    name: amplify-lms-frontend
    env: static
    plan: free
    buildCommand: npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_BACKEND_URL
        fromService:
          name: amplify-lms-backend
          type: web
          property: url